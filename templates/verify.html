<!DOCTYPE html>
<html>
<head>
<title>Verify OTP</title>

<style>
body{
    background:#f5f1e8;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:'Segoe UI';
}

.box{
    background:white;
    padding:40px;
    border-radius:15px;
    width:300px;
    text-align:center;
}

input{
    width:100%;
    padding:12px;
    margin:15px 0;
    border:1px solid #ddd;
    border-radius:8px;
}

button{
    width:100%;
    padding:12px;
    background:#8b6f47;
    color:white;
    border:none;
    border-radius:8px;
}
</style>

</head>

<body>

<div class="box">
<h2>Enter OTP</h2>

<form method="POST">
<input type="text" name="otp" placeholder="OTP">
<button>Verify</button>
</form>

</div>

</body>
</html>

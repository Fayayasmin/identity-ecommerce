<!DOCTYPE html>
<html>
<head>
<style>
body{
    background:#f5f1e8;
    font-family:Segoe UI;
    padding:20px;
}

h2{
    color:#5c4432;
}

/* CATEGORY BUTTONS */
.categories a{
    margin:5px;
    padding:8px 15px;
    background:#8b6f47;
    color:white;
    text-decoration:none;
    border-radius:8px;
}

/* PRODUCT GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
    margin-top:20px;
}

.card{
    background:white;
    padding:15px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    text-align:center;
}

img{
    width:100%;
    height:150px;
    object-fit:cover;
}

button{
    background:#8b6f47;
    color:white;
    border:none;
    padding:8px;
    width:100%;
    border-radius:6px;
}
</style>
</head>

<body>

<h2>Welcome {{session['user_id']}}</h2>

<div class="categories">
<a href="/dashboard">All</a>
<a href="/dashboard?category=men">Men</a>
<a href="/dashboard?category=women">Women</a>
<a href="/dashboard?category=kids">Kids</a>
</div>

<div class="grid">
{% for p in products %}
<div class="card">
<img src="{{ url_for('static', filename='uploads/' + p['image']) }}">
<h3>{{p['name']}}</h3>
<p>₹{{p['price']}}</p>
<a href="/add_to_cart/{{p['id']}}">
<button>Add to Cart</button>
</a>
</div>
{% endfor %}
</div>

<br>
<a href="/cart">🛒 Go to Cart</a> |
<a href="/logout">Logout</a>

</body>
</html>

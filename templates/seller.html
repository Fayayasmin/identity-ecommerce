<!DOCTYPE html>
<html>
<head>
<title>Seller Dashboard</title>

<style>
body{
    background:#faf7f2;
    font-family:'Segoe UI';
    padding:30px;
}

.container{
    max-width:900px;
    margin:auto;
}

.card{
    background:white;
    padding:15px;
    margin:10px;
    border-radius:12px;
    display:inline-block;
    width:200px;
    text-align:center;
}

img{
    width:100%;
    height:150px;
    object-fit:cover;
    border-radius:8px;
}

form{
    margin-top:30px;
    background:white;
    padding:20px;
    border-radius:12px;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
}

button{
    padding:10px;
    background:#8b6f47;
    color:white;
    border:none;
    border-radius:6px;
}
</style>

</head>

<body>

<div class="container">

<h2>Seller Dashboard</h2>

<h3>Your Products</h3>

{% for p in products %}
<div class="card">
    <img src="{{ url_for('static', filename='uploads/' + p.image) }}">
    <h4>{{p.name}}</h4>
    <p>₹{{p.price}}</p>
</div>
{% endfor %}

<h3>Add Product</h3>

<form method="POST" action="/add_product" enctype="multipart/form-data">
<input type="text" name="name" placeholder="Product Name">
<input type="number" name="price" placeholder="Price">
<input type="file" name="image">
<button>Add</button>
</form>

</div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI';
}

body{
    height:100vh;

    /* ✅ CLEAR IMAGE */
    background: url("{{ url_for('static', filename='images/bg.jpg') }}") no-repeat center center fixed;
    background-size:cover;

    display:flex;
    justify-content:center;
    align-items:center;
}

/* ✅ LIGHT OVERLAY (NOT BLUR) */
body::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.2); /* adjust 0.1–0.3 */
    z-index:0;
}

/* BOX */
.box{
    position:relative;
    z-index:1;

    width:350px;
    padding:40px;

    background:white;
    border-radius:15px;

    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

/* TITLE */
h2{
    text-align:center;
    margin-bottom:20px;
    color:#5c4432;
}

/* INPUT */
input, select{
    width:100%;
    padding:12px;
    margin:10px 0;

    border:1px solid #ddd;
    border-radius:8px;
}

/* BUTTON */
button{
    width:100%;
    padding:12px;

    background:#8b6f47;
    color:white;

    border:none;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#5c4432;
}

/* LINK */
a{
    display:block;
    text-align:center;
    margin-top:10px;
    color:#8b6f47;
}
</style>

</head>

<body>

<div class="box">

<h2>Login</h2>

<form method="POST">
<input type="text" name="user_id" placeholder="User ID" required>
<input type="password" name="password" placeholder="Password" required>

<select name="role">
<option value="user">User</option>
<option value="seller">Seller</option>
<option value="admin">Admin</option>
</select>

<button>Login</button>
</form>

<a href="/register">Create Account</a>

</div>

</body>
</html>
